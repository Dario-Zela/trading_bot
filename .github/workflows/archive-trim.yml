name: Archive trim

# Phase 7 — bundles old news / macro editions into compressed tarballs
# at state/archive/*.tar.gz, removing the originals from docs/. Runs
# weekly on Sunday 04:00 UTC, well before the news brief (05:00) and
# the morning entry pipelines.
#
# Idempotent: if nothing is old enough, the workflow is a no-op.

on:
  workflow_dispatch:
    inputs:
      keep_days:
        description: "Keep editions younger than this many days"
        required: false
        default: "90"
      dry_run:
        description: "Set to 'true' to preview without writing"
        required: false
        default: "false"

concurrency:
  group: archive-trim
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  trim:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run archive trim
        run: |
          KEEP_DAYS="${{ github.event.inputs.keep_days || '90' }}"
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python scripts/archive_old_editions.py --keep-days "$KEEP_DAYS" $DRY_RUN_FLAG

      - name: Commit + push archive deltas
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "trading-bot[bot]"
          git config user.email "trading-bot@users.noreply.github.com"
          git add state/archive docs/news docs/macro .gitattributes || true
          if git diff --cached --quiet; then
            echo "No archive deltas to commit"
            exit 0
          fi
          git commit -m "archive trim — $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || git rebase --abort || true
            if git push; then exit 0; fi
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done
          echo "Could not push after 3 attempts"
          exit 1
