name: DST sync

# Sunday 02:00 UTC — after the UK DST shift would have occurred (01:00 UTC
# spring forward / fall back). The script computes the correct UTC time for
# each market's local wall-clock target and rewrites the cron lines in the
# pipeline workflows if they've drifted. Idempotent: no-op when nothing
# changed (most weeks).

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

concurrency:
  group: dst-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run DST sync
        run: python -m trading_bot.pipeline dst-sync

      - name: Commit if changed
        run: |
          git config user.name "trading-bot[bot]"
          git config user.email "trading-bot@users.noreply.github.com"
          git add .github/workflows || true
          if git diff --cached --quiet; then
            echo "DST schedule already correct — no commit needed"
            exit 0
          fi
          git commit -m "dst-sync — $(date -u +%Y-%m-%d) — clocks shifted"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || git rebase --abort || true
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done
          echo "Could not push after 3 attempts"
          exit 1
