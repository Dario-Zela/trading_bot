name: US pipeline

# Triggered Mon–Fri at NYSE-relative times by cron-job.org via
# workflow_dispatch (entry: 09:35 ET, exit: 15:30 ET — cron-job.org
# handles DST). No GH Actions schedule here; that scheduler has proven
# unreliable.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'entry / exit / clear-slot'
        required: true
        type: choice
        options:
          - entry
          - exit
          - clear-slot
      slot:
        description: 'Alpaca slot to clear (only for clear-slot mode)'
        required: false
        default: '1'
        type: string

concurrency:
  group: pipeline-us
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Decide mode
        id: mode
        run: echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Claude Code CLI
        if: steps.mode.outputs.mode == 'entry' || steps.mode.outputs.mode == 'exit'
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          claude --version || (echo "claude not on PATH after install"; exit 1)

      - name: Run pipeline (${{ steps.mode.outputs.mode }})
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
          ALPACA_API_KEY__1: ${{ secrets.ALPACA_API_KEY__1 }}
          ALPACA_API_SECRET__1: ${{ secrets.ALPACA_API_SECRET__1 }}
          ALPACA_API_KEY__2: ${{ secrets.ALPACA_API_KEY__2 }}
          ALPACA_API_SECRET__2: ${{ secrets.ALPACA_API_SECRET__2 }}
          ALPACA_API_KEY__3: ${{ secrets.ALPACA_API_KEY__3 }}
          ALPACA_API_SECRET__3: ${{ secrets.ALPACA_API_SECRET__3 }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          case "${{ steps.mode.outputs.mode }}" in
            exit)
              # Three-phase exit: close positions, LLM reflection (Wave 2c),
              # then build dashboard, then email summary.
              python -m trading_bot.pipeline exit --region us
              python -m trading_bot.pipeline reflect --region us || echo "Reflection step failed (non-fatal)"
              python -m trading_bot.dashboard.build
              python -m trading_bot.pipeline summary --region us
              ;;
            clear-slot)
              python -m trading_bot.pipeline clear-slot --slot "${{ inputs.slot }}"
              ;;
            *)
              python -m trading_bot.pipeline entry --region us
              ;;
          esac

      - name: Commit state and dashboard back
        run: |
          git config user.name "trading-bot[bot]"
          git config user.email "trading-bot@users.noreply.github.com"
          git add state docs || true
          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi
          MSG="pipeline ${{ steps.mode.outputs.mode }} run — $(date -u +%Y-%m-%dT%H:%MZ)"
          git commit -m "$MSG"

          # First try: simple rebase + push (handles non-conflicting drift cleanly)
          for i in 1 2; do
            if git pull --rebase --autostash origin main && git push; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "Push attempt $i failed; will retry with smart merge..."
            sleep 2
          done

          # Smart-merge fallback: save our JSONL additions, hard-reset to remote,
          # re-apply additions via line-union, rebuild dashboard, push.
          echo "Falling back to smart-merge strategy..."
          mkdir -p /tmp/save
          cp -r state /tmp/save/ 2>/dev/null || true
          git fetch origin main
          git reset --hard origin/main
          python3 .github/scripts/smart_merge_state.py "$PWD" /tmp/save
          python -m trading_bot.dashboard.build || true
          git add state docs || true
          if git diff --cached --quiet; then
            echo "Smart-merge produced no new changes; remote already has everything"
            exit 0
          fi
          git commit -m "$MSG (smart-merged)"
          git push
