name: US pipeline

# US market: 14:30–21:00 UK (always — ET is UK-5).
# Entry 5 min after open. Exit 30 min before close.
# Wave 1 uses fixed UTC crons aligned to UK summer (BST). In GMT the wall-clock
# is 1h earlier; for daily-bar strategies the offset doesn't matter. DST-correct
# scheduling is a Wave 2 follow-up.

on:
  schedule:
    # 13:35 UTC weekdays — entry (14:35 BST / 13:35 GMT)
    - cron: '35 13 * * 1-5'
    # 19:30 UTC weekdays — exit (20:30 BST / 19:30 GMT)
    - cron: '30 19 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'entry / exit / clear-slot'
        required: true
        type: choice
        options:
          - entry
          - exit
          - clear-slot
      slot:
        description: 'Alpaca slot to clear (only for clear-slot mode)'
        required: false
        default: '1'
        type: string

concurrency:
  group: pipeline-us
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Decide mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "35 13 * * 1-5" ]; then
            echo "mode=entry" >> $GITHUB_OUTPUT
          else
            echo "mode=exit" >> $GITHUB_OUTPUT
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Claude Code CLI
        if: steps.mode.outputs.mode == 'entry' || steps.mode.outputs.mode == 'exit'
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          claude --version || (echo "claude not on PATH after install"; exit 1)

      - name: Run pipeline (${{ steps.mode.outputs.mode }})
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
          ALPACA_API_KEY__1: ${{ secrets.ALPACA_API_KEY__1 }}
          ALPACA_API_SECRET__1: ${{ secrets.ALPACA_API_SECRET__1 }}
          ALPACA_API_KEY__2: ${{ secrets.ALPACA_API_KEY__2 }}
          ALPACA_API_SECRET__2: ${{ secrets.ALPACA_API_SECRET__2 }}
          ALPACA_API_KEY__3: ${{ secrets.ALPACA_API_KEY__3 }}
          ALPACA_API_SECRET__3: ${{ secrets.ALPACA_API_SECRET__3 }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          case "${{ steps.mode.outputs.mode }}" in
            exit)
              # Three-phase exit: close positions, LLM reflection (Wave 2c),
              # then build dashboard, then email summary.
              python -m trading_bot.pipeline exit --region us
              python -m trading_bot.pipeline reflect --region us || echo "Reflection step failed (non-fatal)"
              python -m trading_bot.dashboard.build
              python -m trading_bot.pipeline summary --region us
              ;;
            clear-slot)
              python -m trading_bot.pipeline clear-slot --slot "${{ inputs.slot }}"
              ;;
            *)
              python -m trading_bot.pipeline entry --region us
              ;;
          esac

      - name: Commit state and dashboard back
        run: |
          git config user.name "trading-bot[bot]"
          git config user.email "trading-bot@users.noreply.github.com"
          git add state docs || true
          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi
          git commit -m "pipeline ${{ steps.mode.outputs.mode }} run — $(date -u +%Y-%m-%dT%H:%MZ)"
          # Retry against remote drift (someone pushed during the run)
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || git rebase --abort || true
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying after fetch..."
            sleep 2
          done
          echo "Could not push state after 3 attempts"
          exit 1
