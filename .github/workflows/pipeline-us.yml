name: US pipeline

# Triggered Mon–Fri at NYSE-relative times by cron-job.org via
# workflow_dispatch (entry: 09:05 ET, exit: 15:00 ET — cron-job.org
# handles DST). The cron fires 30 min early so the multi-stage
# pipeline finishes by the actual market window. No GH Actions
# schedule here; that scheduler has proven unreliable.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'entry / exit / clear-slot'
        required: true
        type: choice
        options:
          - entry
          - exit
          - clear-slot
      slot:
        description: 'Alpaca slot to clear (only for clear-slot mode)'
        required: false
        default: '1'
        type: string

# Each workflow uses its own concurrency group, so this does NOT serialize
# state-pushes across workflows — cross-workflow contention on main is handled
# at the git layer instead (the rebase-retry + smart_merge_state.py fallback in
# the commit step). Serializing all main-pushers into one shared group would be
# cleaner but slower; the merge machinery is the deliberate trade-off.
concurrency:
  group: pipeline-us
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Decide mode
        id: mode
        run: echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Claude Code CLI
        if: steps.mode.outputs.mode == 'entry' || steps.mode.outputs.mode == 'exit'
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          claude --version || (echo "claude not on PATH after install"; exit 1)

      - name: Restore OHLCV cache
        uses: actions/cache/restore@v5
        with:
          path: state/ohlcv.db
          key: ohlcv-db-v1-${{ github.run_id }}
          restore-keys: |
            ohlcv-db-v1-

      - name: Run pipeline (${{ steps.mode.outputs.mode }})
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
          ALPACA_API_KEY__1: ${{ secrets.ALPACA_API_KEY__1 }}
          ALPACA_API_SECRET__1: ${{ secrets.ALPACA_API_SECRET__1 }}
          ALPACA_API_KEY__2: ${{ secrets.ALPACA_API_KEY__2 }}
          ALPACA_API_SECRET__2: ${{ secrets.ALPACA_API_SECRET__2 }}
          ALPACA_API_KEY__3: ${{ secrets.ALPACA_API_KEY__3 }}
          ALPACA_API_SECRET__3: ${{ secrets.ALPACA_API_SECRET__3 }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          STOOQ_API_KEY: ${{ secrets.STOOQ_API_KEY }}
        run: |
          case "${{ steps.mode.outputs.mode }}" in
            exit)
              # Three-phase exit: close positions, LLM reflection (Wave 2c),
              # then build dashboard, then email summary.
              python -m trading_bot.pipeline exit --region us
              python -m trading_bot.pipeline reflect --region us || echo "Reflection step failed (non-fatal)"
              python -m trading_bot.dashboard.build
              python -m trading_bot.pipeline summary --region us
              ;;
            clear-slot)
              python -m trading_bot.pipeline clear-slot --slot "${{ inputs.slot }}"
              ;;
            *)
              # OHLCV cache refresh happens in a separate workflow
              # (ohlcv-daily-update.yml) triggered alongside the news
              # brief; entry just reads from the warm cache.
              python -m trading_bot.pipeline entry --region us
              ;;
          esac

      - name: Save OHLCV cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: state/ohlcv.db
          key: ohlcv-db-v1-${{ github.run_id }}

      - name: Commit state and dashboard back
        run: |
          git config user.name "trading-bot[bot]"
          git config user.email "trading-bot@users.noreply.github.com"
          git add state docs || true
          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi
          MSG="pipeline ${{ steps.mode.outputs.mode }} run — $(date -u +%Y-%m-%dT%H:%MZ)"
          git commit -m "$MSG"

          # First try: simple rebase + push (handles non-conflicting drift cleanly)
          for i in 1 2; do
            if git pull --rebase --autostash origin main && git push; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "Push attempt $i failed; will retry with smart merge..."
            sleep 2
          done

          # Smart-merge fallback: save our JSONL additions, hard-reset to remote,
          # re-apply additions via line-union, rebuild dashboard, push.
          echo "Falling back to smart-merge strategy..."
          mkdir -p /tmp/save
          cp -r state /tmp/save/ 2>/dev/null || true
          # Capture the non-JSONL state files THIS run changed (vs the base it
          # committed on). The 3 line-unioned JSONL files are excluded —
          # smart_merge_state.py merges those with remote. Restoring only our
          # changed files (local-wins) preserves e.g. kill-switch/halt state
          # and the currency cache through the hard reset, while files a
          # concurrent run changed stay at the remote version (no clobber).
          CHANGED_STATE=$(git diff --name-only HEAD~1 HEAD -- state \
            | grep -vE 'state/(ledger|predictions|macro/predictions|trail_exits)\.jsonl$|state/pick_adjustments/.*\.jsonl$' || true)
          git fetch origin main
          git reset --hard origin/main
          python3 .github/scripts/smart_merge_state.py "$PWD" /tmp/save
          for f in $CHANGED_STATE; do
            if [ -f "/tmp/save/$f" ]; then
              mkdir -p "$(dirname "$f")"
              cp "/tmp/save/$f" "$f"
            fi
          done
          python -m trading_bot.dashboard.build || true
          git add state docs || true
          if git diff --cached --quiet; then
            echo "Smart-merge produced no new changes; remote already has everything"
            exit 0
          fi
          git commit -m "$MSG (smart-merged)"
          git push
