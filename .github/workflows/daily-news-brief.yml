name: Daily news brief

# Triggered Mon-Fri ~06:30 UTC by cron-job.org via workflow_dispatch.
# Runs ~1h before UK-EU entry so strategies can read the brief.
#
# Multi-stage agent pipeline (Phase 2): Discovery → Triage → Publisher
# → Briefs/Articles/Floor/Desks (parallel) → BotSummary → Render.
# Total runtime is ~7-12 minutes; the job-level timeout is generous.

on:
  workflow_dispatch:

concurrency:
  group: daily-news-brief
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    # 30 min was tight on a busy day: 42 candidates, 6 parallel Sonnet
    # article writers each doing WebSearch + WebFetch for images +
    # source verification. Worst-case path through the pipeline:
    # discovery 4m + triage 3m + publisher 10m + articles 12m + summary
    # 1m ≈ 30m with no slack. Bumping to 60 gives genuine headroom.
    timeout-minutes: 60
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          claude --version

      - name: Run daily news brief
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ALPACA_API_KEY__1: ${{ secrets.ALPACA_API_KEY__1 }}
          ALPACA_API_SECRET__1: ${{ secrets.ALPACA_API_SECRET__1 }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
        run: python -m trading_bot.pipeline daily-news-brief

      - name: Commit brief + rendered page back
        run: |
          git config user.name "trading-bot[bot]"
          git config user.email "trading-bot@users.noreply.github.com"
          git add state/daily_news state/predictions docs/news || true
          if git diff --cached --quiet; then
            echo "No brief written; skipping commit"
            exit 0
          fi
          git commit -m "daily news brief — $(date -u +%Y-%m-%d)"

          # First try: plain rebase. Most common case is clean drift
          # (no overlapping edits). Retries use "-X theirs" which,
          # during a rebase, takes the LOCAL commit's version on
          # conflict — that's what we want for docs/news/index.html
          # and the per-date state files, both of which are fully
          # regenerated each run and so always reflect today's
          # authoritative output. (Rebase semantics flip "ours" and
          # "theirs" relative to merge — `theirs` here = local.)
          for i in 1 2 3; do
            strategy=""
            if [ "$i" -gt 1 ]; then
              strategy="-X theirs"
            fi
            if git pull --rebase --autostash $strategy origin main && git push; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done
          echo "Could not push after 3 attempts — recovery step will try Claude-assisted resolution"
          exit 1

      - name: Recovery — Claude resolves conflicts
        if: failure()
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # Last-resort recovery: drive a Python helper that uses
          # the Claude Code CLI to actually read each conflicting
          # file, decide which side to keep (per a path-specific
          # policy), write the resolution back, and continue the
          # rebase + push. Only fires when the prior commit step
          # failed (`if: failure()`).
          git config user.name "trading-bot[bot]"
          git config user.email "trading-bot@users.noreply.github.com"
          python .github/scripts/claude_resolve_conflicts.py
