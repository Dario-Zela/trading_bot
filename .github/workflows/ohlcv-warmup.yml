name: OHLCV cache warm-up

# Manually dispatched maintenance workflow. Builds / refreshes the
# local SQLite OHLCV cache (state/ohlcv.db) from yfinance + Stooq so
# subsequent morning entry pipelines read from disk instead of doing
# a cold network fetch.
#
# Persistence: uses actions/cache to keep state/ohlcv.db alive between
# workflow runs. The pipeline-{us,uk-eu}.yml workflows use the same
# cache key so they automatically restore the warmed cache at the
# start of their morning run and save any updates at the end.
#
# Run this once after major universe changes (e.g. switching strategies
# to t212_isa_*) so the first morning entry pipeline doesn't pay the
# full cold-cache yfinance/Stooq fetch.

on:
  workflow_dispatch:

concurrency:
  group: ohlcv-warmup
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Job-level env so STOOQ_API_KEY is available to EVERY step,
    # including the yfinance backfill step where get_history's Stooq
    # fallback fires for tickers yfinance couldn't fetch. Without
    # this, every backfill silently missed thousands of tickers
    # (the Stooq pass that came after couldn't even start before the
    # 90-min timeout killed the workflow).
    env:
      STOOQ_API_KEY: ${{ secrets.STOOQ_API_KEY }}
      # Serial is the only reliable mode — even 6-way on a fresh CI IP
      # triggered Stooq's TCP-layer throttle. Slower but doesn't kill
      # the IP for hours. ~30-45 min for 1k missing tickers.
      STOOQ_MAX_PARALLEL: "1"
      STOOQ_REQUEST_SPACING: "0.6"
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore OHLCV cache
        # Restore-only at the start. Save happens explicitly at the
        # end of the job so the cache REFRESHES every run (default
        # actions/cache@v5 only saves on cache miss).
        uses: actions/cache/restore@v5
        with:
          path: state/ohlcv.db
          key: ohlcv-db-v1-${{ github.run_id }}
          # Fall back to any older entry under the same prefix.
          restore-keys: |
            ohlcv-db-v1-

      - name: Cache stats (before)
        run: |
          python -c "
          from trading_bot.tools.ohlcv_store import row_count, store_size_bytes, init_store
          init_store()
          print(f'before: rows={row_count():,}, size={store_size_bytes()/1_048_576:.1f} MB')
          "

      # Five sliced backfill steps so logs become visible at ~6-min
      # intervals instead of one ~30-min black box. Each step writes
      # to the SQLite cache incrementally (per-batch) — kill any step
      # and progress is preserved.
      - name: yfinance backfill (slice 1/5)
        run: python -m trading_bot.pipeline ohlcv-backfill --region us --slice 0 --of 5 || true

      - name: yfinance backfill (slice 2/5)
        run: python -m trading_bot.pipeline ohlcv-backfill --region us --slice 1 --of 5 || true

      - name: yfinance backfill (slice 3/5)
        run: python -m trading_bot.pipeline ohlcv-backfill --region us --slice 2 --of 5 || true

      - name: yfinance backfill (slice 4/5)
        run: python -m trading_bot.pipeline ohlcv-backfill --region us --slice 3 --of 5 || true

      - name: yfinance backfill (slice 5/5)
        run: python -m trading_bot.pipeline ohlcv-backfill --region us --slice 4 --of 5 || true

      # Three sliced Stooq gap-fill steps (~10 min each instead of one
      # ~30-min step). Serial Stooq + per-ticker write-back means kills
      # are non-destructive.
      - name: Stooq gap-fill (slice 1/3)
        run: |
          if [ -z "$STOOQ_API_KEY" ]; then
            echo "STOOQ_API_KEY not set — skipping"; exit 0
          fi
          python -m trading_bot.pipeline ohlcv-stooq-fill-gaps --region us --slice 0 --of 3 || true

      - name: Stooq gap-fill (slice 2/3)
        run: |
          if [ -z "$STOOQ_API_KEY" ]; then exit 0; fi
          python -m trading_bot.pipeline ohlcv-stooq-fill-gaps --region us --slice 1 --of 3 || true

      - name: Stooq gap-fill (slice 3/3)
        run: |
          if [ -z "$STOOQ_API_KEY" ]; then exit 0; fi
          python -m trading_bot.pipeline ohlcv-stooq-fill-gaps --region us --slice 2 --of 3 || true

      - name: Cache stats (after)
        run: |
          python -c "
          from trading_bot.tools.ohlcv_store import row_count, store_size_bytes
          print(f'after:  rows={row_count():,}, size={store_size_bytes()/1_048_576:.1f} MB')
          "

      - name: Save OHLCV cache
        # `if: always()` so a partial backfill still persists what got
        # cached before the failure. Unique key per run guarantees the
        # save actually happens (default action only saves on miss).
        if: always()
        uses: actions/cache/save@v5
        with:
          path: state/ohlcv.db
          key: ohlcv-db-v1-${{ github.run_id }}
