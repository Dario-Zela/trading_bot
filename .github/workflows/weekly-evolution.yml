name: Weekly evolution

# Triggered every Saturday 09:00 UTC by cron-job.org via workflow_dispatch.
# Runs after the week's trading is complete (US closed Friday) and before
# Monday's pipelines. The agent computes per-strategy metrics over the
# rolling 14-day window, asks Claude for action recommendations, then
# auto-executes anything that stays on Tier 0 (shadow) / Tier 1 (alpaca-
# paper). Tier 2 promotions are surfaced as GitHub Issues for human
# approval.

on:
  workflow_dispatch:

concurrency:
  group: weekly-evolution
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Claude Code CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          claude --version

      - name: Scan external research (Sonnet + WebSearch)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # Runs BEFORE the evolution agent so the brief it produces
          # is the freshest available when the evolution prompt reads
          # it from state/external_research/<iso-week>.json. Non-fatal
          # — if the scan fails, the evolution still runs with
          # whatever last week's brief said (or a placeholder if
          # this is the first run).
          python -m trading_bot.pipeline weekly-external-research || \
            echo "External research scan failed (non-fatal)"

      - name: Run weekly evolution
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ALPACA_API_KEY__1: ${{ secrets.ALPACA_API_KEY__1 }}
          ALPACA_API_SECRET__1: ${{ secrets.ALPACA_API_SECRET__1 }}
          ALPACA_API_KEY__2: ${{ secrets.ALPACA_API_KEY__2 }}
          ALPACA_API_SECRET__2: ${{ secrets.ALPACA_API_SECRET__2 }}
          ALPACA_API_KEY__3: ${{ secrets.ALPACA_API_KEY__3 }}
          ALPACA_API_SECRET__3: ${{ secrets.ALPACA_API_SECRET__3 }}
          # gh CLI uses GH_TOKEN to authenticate against the GitHub API for issue creation
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m trading_bot.pipeline weekly-evolution

      - name: Commit state + config changes back
        run: |
          git config user.name "trading-bot[bot]"
          git config user.email "trading-bot@users.noreply.github.com"
          git add state strategies || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "weekly evolution — $(date -u +%Y-%m-%dT%H:%MZ)"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main || git rebase --abort || true
            if git push; then
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done
          echo "Could not push after 3 attempts"
          exit 1
