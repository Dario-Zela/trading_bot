name: UK/EU pipeline

# Triggered Mon–Fri at LSE-relative times by cron-job.org via
# workflow_dispatch (entry: 08:05 UK, exit: 15:30 UK — cron-job.org
# handles DST). The cron fires 30 min early so the multi-stage
# pipeline finishes by the actual market window. No GH Actions
# schedule here; that scheduler has proven unreliable.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'entry / exit'
        required: true
        type: choice
        options:
          - entry
          - exit

concurrency:
  group: pipeline-uk-eu
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    # Cap at 90 min — historical runs are 15-30 min, and a 6-hour GH
    # default lets a deadlock run for hours unnoticed. If we hit this
    # cap something is genuinely stuck and needs investigation.
    timeout-minutes: 90
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Decide mode
        id: mode
        run: echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Claude Code CLI
        if: steps.mode.outputs.mode == 'entry' || steps.mode.outputs.mode == 'exit'
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          claude --version

      - name: Restore OHLCV cache
        uses: actions/cache/restore@v4
        with:
          path: state/ohlcv.db
          key: ohlcv-db-v1-${{ github.run_id }}
          restore-keys: |
            ohlcv-db-v1-

      - name: Run pipeline (${{ steps.mode.outputs.mode }})
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
          # UK strategies don't use Alpaca for execution but the data tools may (news API)
          ALPACA_API_KEY__1: ${{ secrets.ALPACA_API_KEY__1 }}
          ALPACA_API_SECRET__1: ${{ secrets.ALPACA_API_SECRET__1 }}
          # Trading212 demo (Practice mode) — slot 1 covers UK-EU strategies
          # that have been promoted to tier=trading212-paper. Safe to leave
          # unset; only required if any UK-EU strategy is on that tier. T212
          # issues both a key and a secret per credential pair; we support
          # HTTP Basic auth when both are set, single-header when only the
          # key is set (older client behaviour).
          T212_API_KEY__1: ${{ secrets.T212_API_KEY__1 }}
          T212_API_SECRET__1: ${{ secrets.T212_API_SECRET__1 }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Stooq is the secondary OHLCV source — used by ohlcv-daily-update +
          # ohlcv-stooq-fill-gaps to recover yfinance misses. Free key, captcha-gated.
          # Set as a repo secret: visit
          # https://stooq.com/q/d/?s=aapl.us&get_apikey, solve captcha,
          # copy the apikey value out of the URL.
          STOOQ_API_KEY: ${{ secrets.STOOQ_API_KEY }}
        run: |
          case "${{ steps.mode.outputs.mode }}" in
            exit)
              python -m trading_bot.pipeline exit --region uk-eu
              python -m trading_bot.pipeline reflect --region uk-eu || echo "Reflection step failed (non-fatal)"
              # Cache warm-up was previously on this critical path but fetching
              # yfinance for the ~15k full active universe on a cold cache took
              # 45-90 min and stuck the exit workflow indefinitely. Now handled
              # by the dedicated ohlcv-warmup workflow (manual + scheduled);
              # the entry pipeline's restored actions/cache state covers the
              # daily case.
              python -m trading_bot.dashboard.build
              python -m trading_bot.pipeline summary --region uk-eu
              ;;
            *)
              python -m trading_bot.pipeline entry --region uk-eu
              ;;
          esac

      - name: Save OHLCV cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state/ohlcv.db
          key: ohlcv-db-v1-${{ github.run_id }}

      - name: Commit state and dashboard back
        run: |
          git config user.name "trading-bot[bot]"
          git config user.email "trading-bot@users.noreply.github.com"
          git add state docs || true
          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi
          MSG="pipeline-uk-eu ${{ steps.mode.outputs.mode }} run — $(date -u +%Y-%m-%dT%H:%MZ)"
          git commit -m "$MSG"

          for i in 1 2; do
            if git pull --rebase --autostash origin main && git push; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            echo "Push attempt $i failed; will retry with smart merge..."
            sleep 2
          done

          echo "Falling back to smart-merge strategy..."
          mkdir -p /tmp/save
          cp -r state /tmp/save/ 2>/dev/null || true
          git fetch origin main
          git reset --hard origin/main
          python3 .github/scripts/smart_merge_state.py "$PWD" /tmp/save
          python -m trading_bot.dashboard.build || true
          git add state docs || true
          if git diff --cached --quiet; then
            echo "Smart-merge produced no new changes; remote already has everything"
            exit 0
          fi
          git commit -m "$MSG (smart-merged)"
          git push
