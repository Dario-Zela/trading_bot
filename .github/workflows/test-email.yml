name: Test email

# One-shot cron + manual trigger. Used to verify the Brevo email path works
# end-to-end in CI. Delete or disable this workflow after verification.

on:
  schedule:
    # Today only — May 17 at 18:28 UTC. Won't fire again for a year (so safe
    # to leave the file in place if you want to keep the workflow_dispatch button).
    - cron: '28 18 17 5 *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Send test email
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
        run: |
          python -c "
          from datetime import datetime, timezone
          from trading_bot.notify import send_summary_email

          now = datetime.now(timezone.utc).isoformat()
          text = f'''trading-bot test email

          Fired at: {now}
          Trigger: ${{ github.event_name }}

          If you got this, the Brevo email path is wired up correctly.'''
          html = f'''<html><body style=\"font-family:-apple-system,sans-serif;padding:24px;\">
          <h2 style=\"margin:0 0 8px;\">⚡ trading-bot — test email</h2>
          <p style=\"color:#6b7280;\">Fired at <strong>{now}</strong> · trigger <code>${{ github.event_name }}</code></p>
          <p>If you got this, the Brevo email path is wired up correctly end-to-end and the daily pipeline will be able to deliver summaries.</p>
          </body></html>'''
          send_summary_email(subject='[trading-bot] test email', body_text=text, body_html=html)
          print('Sent OK')
          "
