name: Health check

# Phase 9F — nightly bot-health summary. Flags failed workflows,
# ledger staleness, predictions log corruption, kill-switch state,
# and state-directory growth. Silent if all good; emails a summary
# otherwise.

on:
  workflow_dispatch:

concurrency:
  group: health-check
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run health check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
        run: python scripts/health_check.py --send-email
