name: Recover T212 strands

# One-off / on-demand recovery for T212-paper trades whose exit cron
# poll timed out before the broker's SELL fill landed. Queries T212
# order history, back-fills entry + exit prices for each stranded
# ledger row, and commits the updated ledger.
#
# Trigger manually via the Actions tab when the daily-summary email
# shows currently-open T212-paper positions that the broker has
# already cleared (account-status shows 0 positions).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "diag = print T212 history. recover = back-fill ledger. reflect = LLM reflections on recovered trades."
        required: true
        default: diag
        type: choice
        options:
          - diag
          - recover
          - reflect

permissions:
  contents: write

jobs:
  recover:
    runs-on: ubuntu-latest
    # Reflect mode chunks Sonnet calls per (date, region, strategy)
    # so a single workflow run is bounded by REFLECT_DAYS_LIMIT, not
    # by total history. 30 minutes leaves comfortable headroom for
    # the default 2 days × ~10 strategy-chunk calls.
    timeout-minutes: 30
    concurrency:
      group: trading-bot-state
      cancel-in-progress: false
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.STATE_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Claude Code CLI
        if: ${{ inputs.mode == 'reflect' }}
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          claude --version

      - name: Diagnostic — dump T212 history for stranded trades
        if: ${{ inputs.mode == 'diag' }}
        env:
          T212_API_KEY__1: ${{ secrets.T212_API_KEY__1 }}
          T212_API_SECRET__1: ${{ secrets.T212_API_SECRET__1 }}
          T212_API_KEY__2: ${{ secrets.T212_API_KEY__2 }}
          T212_API_SECRET__2: ${{ secrets.T212_API_SECRET__2 }}
          T212_API_KEY__3: ${{ secrets.T212_API_KEY__3 }}
          T212_API_SECRET__3: ${{ secrets.T212_API_SECRET__3 }}
        run: python scripts/t212_history_diag.py

      - name: Recover — back-fill ledger
        if: ${{ inputs.mode == 'recover' }}
        env:
          T212_API_KEY__1: ${{ secrets.T212_API_KEY__1 }}
          T212_API_SECRET__1: ${{ secrets.T212_API_SECRET__1 }}
          T212_API_KEY__2: ${{ secrets.T212_API_KEY__2 }}
          T212_API_SECRET__2: ${{ secrets.T212_API_SECRET__2 }}
          T212_API_KEY__3: ${{ secrets.T212_API_KEY__3 }}
          T212_API_SECRET__3: ${{ secrets.T212_API_SECRET__3 }}
        run: python scripts/recover_t212_strands.py

      - name: Reflect — LLM reflections on recovered trades
        if: ${{ inputs.mode == 'reflect' }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: python scripts/reflect_recovered_trades.py

      - name: Rebuild dashboard data
        if: ${{ inputs.mode == 'recover' || inputs.mode == 'reflect' }}
        run: python -m trading_bot.dashboard.build
        continue-on-error: true

      - name: Commit ledger state back
        if: ${{ always() && (inputs.mode == 'recover' || inputs.mode == 'reflect') }}
        run: |
          git config user.name "trading-bot[bot]"
          git config user.email "trading-bot@users.noreply.github.com"
          # Predictions reflections live alongside the ledger
          # reflections — include both so partial progress survives
          # a workflow cancel / timeout. `always()` means we still
          # commit if the reflect step itself ran out of budget
          # mid-day; tomorrow's run picks up where we stopped.
          git add state/ledger.jsonl state/predictions.jsonl docs/data.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit"
            exit 0
          fi
          case "${{ inputs.mode }}" in
            recover) MSG="recover T212 strands — $(date -u +%Y-%m-%dT%H:%MZ)" ;;
            reflect) MSG="reflect on recovered trades + predictions — $(date -u +%Y-%m-%dT%H:%MZ)" ;;
            *) MSG="recover-t212-strands ${{ inputs.mode }} — $(date -u +%Y-%m-%dT%H:%MZ)" ;;
          esac
          git commit -m "$MSG"
          git push origin HEAD:main
