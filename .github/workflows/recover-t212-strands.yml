name: T212 diagnostic + reflection catchup

# On-demand diagnostic + reflection-backfill workflow.
#
# The "recover" + "recover-alpaca" modes that lived here previously
# back-filled stranded broker positions when the exit cron mis-handled
# them. Both have been retired — the underlying bugs (T212 history-
# shape parse, Alpaca bracket-only recovery, smart-merge dropping
# closure rows) are fixed in the main exit_scheduled path, so future
# cron runs no longer produce the strand patterns they cleaned up.
#
# Two modes remain:
#   diag    — dump T212 history for currently-open T212-paper trades.
#             Useful for inspecting broker latency / fill order state.
#   reflect — catch up LLM reflections (per-trade outcome notes +
#             per-prediction reflection) for any day/region where the
#             daily reflect cron missed rows. Mostly historical
#             backfill at this point.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "diag = print T212 history. reflect = LLM reflections on already-closed trades + ungraded predictions."
        required: true
        default: diag
        type: choice
        options:
          - diag
          - reflect

permissions:
  contents: write

jobs:
  recover:
    runs-on: ubuntu-latest
    # Reflect mode chunks Sonnet calls per (date, region, strategy)
    # so a single workflow run is bounded by REFLECT_DAYS_LIMIT, not
    # by total history. 30 minutes leaves comfortable headroom for
    # the default 2 days × ~10 strategy-chunk calls.
    timeout-minutes: 30
    concurrency:
      group: trading-bot-state
      cancel-in-progress: false
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.STATE_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install Claude Code CLI
        if: ${{ inputs.mode == 'reflect' }}
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          claude --version

      - name: Diagnostic — dump T212 history for stranded trades
        if: ${{ inputs.mode == 'diag' }}
        env:
          T212_API_KEY__1: ${{ secrets.T212_API_KEY__1 }}
          T212_API_SECRET__1: ${{ secrets.T212_API_SECRET__1 }}
          T212_API_KEY__2: ${{ secrets.T212_API_KEY__2 }}
          T212_API_SECRET__2: ${{ secrets.T212_API_SECRET__2 }}
          T212_API_KEY__3: ${{ secrets.T212_API_KEY__3 }}
          T212_API_SECRET__3: ${{ secrets.T212_API_SECRET__3 }}
        run: python scripts/t212_history_diag.py

      - name: Reflect — LLM reflections on recovered trades
        if: ${{ inputs.mode == 'reflect' }}
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: python scripts/reflect_recovered_trades.py

      - name: Rebuild dashboard data
        if: ${{ inputs.mode == 'reflect' }}
        run: python -m trading_bot.dashboard.build
        continue-on-error: true

      - name: Commit ledger state back
        if: ${{ always() && inputs.mode == 'reflect' }}
        run: |
          git config user.name "trading-bot[bot]"
          git config user.email "trading-bot@users.noreply.github.com"
          git add state/ledger.jsonl state/predictions.jsonl docs/data.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit"
            exit 0
          fi
          case "${{ inputs.mode }}" in
            reflect)         MSG="reflect on recovered trades + predictions — $(date -u +%Y-%m-%dT%H:%MZ)" ;;
            *)               MSG="recover-t212-strands ${{ inputs.mode }} — $(date -u +%Y-%m-%dT%H:%MZ)" ;;
          esac
          git commit -m "$MSG"
          git push origin HEAD:main
