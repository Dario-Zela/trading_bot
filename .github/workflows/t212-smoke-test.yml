name: T212 smoke test

# Manual-only. Probes the Trading212 demo API with the configured key (and
# optional secret) for a given slot, printing the response from a couple of
# read-only endpoints. Use this to verify auth is set up before binding any
# strategy to tier=trading212-paper.
#
# Read-only — no orders placed, no state committed.

on:
  workflow_dispatch:
    inputs:
      slot:
        description: 'T212 slot to probe (matches T212_API_KEY__N)'
        required: false
        default: '1'
        type: string

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Probe T212 demo API
        env:
          T212_API_KEY__1: ${{ secrets.T212_API_KEY__1 }}
          T212_API_SECRET__1: ${{ secrets.T212_API_SECRET__1 }}
          T212_API_KEY__2: ${{ secrets.T212_API_KEY__2 }}
          T212_API_SECRET__2: ${{ secrets.T212_API_SECRET__2 }}
          T212_API_KEY__3: ${{ secrets.T212_API_KEY__3 }}
          T212_API_SECRET__3: ${{ secrets.T212_API_SECRET__3 }}
        run: |
          python -m trading_bot.t212_smoke --slot ${{ inputs.slot }}
