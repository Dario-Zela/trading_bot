id: commodity-momentum
display_name: "Commodity momentum"
description: |
  LLM-driven. Trades commodity ETFs based on dollar index, real yields,
  supply/demand themes. Commodities are dollar-denominated globally so the
  same US-listed ETF universe (GLD, SLV, USO, DBA, DBB) is used in both
  regions — only the underlying decision logic differs by macro regime.

implementation: llm
active: true

capital_gbp: 10000
max_positions: 3
max_position_pct: 50
min_position_gbp: 100

use_stops: true
use_take_profits: true
stop_loss_pct: -4.0
take_profit_pct: 3.0
last_tune_date: '2026-05-27'

tools:
  - get_universe
  - get_history
  - get_commodity_prices
  - get_dollar_index
  - get_yield_curve
  - get_macro_view
  - get_technicals
  - get_recent_news

model_assignment:
  wide_scoring: haiku
  deep_analysis: sonnet
  final_select: sonnet

runs_in:
  - region: us
    tier: shadow
    universe: us_etfs_commodity
  - region: uk-eu
    tier: shadow
    universe: us_etfs_commodity
