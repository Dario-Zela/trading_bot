id: momentum-trader
display_name: Momentum trader
description: "LLM-driven. Buys recent winners that are still trending. Region-agnostic\n\
  bias \u2014 the same prompt runs against S&P 500 in the US pipeline and against\n\
  UK + EU blue chips in the UK/EU pipeline. The LLM is told the universe is\nwhatever's\
  \ been pre-filtered for it and adapts to the regime.\n"
implementation: llm
active: true
capital_gbp: 10000
max_positions: 4
max_position_pct: 30
min_position_gbp: 50
use_stops: true
use_take_profits: true
stop_loss_pct: -3.0
take_profit_pct: 3.0
tools:
- get_universe
- get_history
- get_technicals
- get_recent_news
- get_macro_view
model_assignment:
  wide_scoring: haiku
  deep_analysis: sonnet
  final_select: sonnet
runs_in:
- region: us
  tier: alpaca-paper
  alpaca_slot: 1
  universe: t212_isa_us
- region: uk-eu
  tier: trading212-paper
  t212_slot: 1
  universe: t212_isa_uk_eu
skip_if_earnings_in_days: 1
prefilter_mode: python
prefilter_top_n: 100
last_tune_date: '2026-05-30'
prefilter_sort_key: abs_return_5d
