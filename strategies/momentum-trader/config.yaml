id: momentum-trader
display_name: Momentum trader
description: "LLM-driven. Buys recent winners that are still trending. Region-agnostic\n\
  bias \u2014 the same prompt runs against S&P 500 in the US pipeline and against\n\
  UK + EU blue chips in the UK/EU pipeline. The LLM is told the universe is\nwhatever's\
  \ been pre-filtered for it and adapts to the regime.\n"
implementation: llm
active: true
capital_gbp: 10000
max_positions: 4
max_position_pct: 30
min_position_gbp: 50
use_stops: true
use_take_profits: true
stop_loss_pct: -3.0
take_profit_pct: 5.0
tools:
- get_universe
- get_history
- get_technicals
- get_recent_news
- get_macro_view
model_assignment:
  wide_scoring: haiku
  deep_analysis: sonnet
  final_select: sonnet
runs_in:
- region: us
  tier: alpaca-paper
  alpaca_slot: 1
  universe: sp1500
- region: uk-eu
  tier: trading212-paper
  t212_slot: 1
  universe: uk_eu_extended
# Phase 8C — drop candidates with earnings inside the window. Technical
# signal becomes unreliable across a binary print, so we avoid the day.
skip_if_earnings_in_days: 1
# LLM strategies use the Sonnet-driven per-strategy pre-filter so the
# universe is narrowed with the strategy's lens before the expensive
# technicals fetch + Stage-1 Haiku scoring. See prompts/prefilter.md
# for this strategy's filter prompt. Tunable by evolution agent.
prefilter_mode: llm
prefilter_top_n: 100
