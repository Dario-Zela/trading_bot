id: macro-aligned
display_name: Macro aligned
description: "LLM-driven. Reads the weekly macro view first; only buys stocks in sectors\n\
  the macro agent is bullish on; avoids bearish sectors. Regime-aware top-down\nstrategy.\
  \ Region-agnostic \u2014 the macro view is global, just the candidate\nuniverse\
  \ differs per region.\n"
implementation: llm
active: true
capital_gbp: 10000
max_positions: 5
max_position_pct: 30
min_position_gbp: 50
use_stops: true
use_take_profits: true
stop_loss_pct: -3.5
take_profit_pct: 3.0
tools:
- get_universe
- get_history
- get_technicals
- get_recent_news
- get_sector_strength
- get_macro_view
- get_daily_news_brief
model_assignment:
  wide_scoring: haiku
  deep_analysis: sonnet
  final_select: sonnet
runs_in:
- region: us
  tier: shadow
  universe: t212_isa_us
- region: uk-eu
  tier: trading212-paper
  t212_slot: 1
  universe: t212_isa_uk_eu
skip_if_earnings_in_days: 1
prefilter_mode: llm
prefilter_top_n: 100
prefilter_sort_key: dollar_volume_desc
last_tune_date: '2026-05-30'
