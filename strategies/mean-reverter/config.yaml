id: mean-reverter
display_name: Mean reverter
description: "LLM-driven. Buys oversold bounces. Weights RSI and distance from MA;\n\
  counter-trend. Region-agnostic \u2014 runs in US and UK/EU pipelines with\ndifferent\
  \ universes.\n"
implementation: llm
active: true
capital_gbp: 10000
max_positions: 5
max_position_pct: 30
min_position_gbp: 50
use_stops: true
use_take_profits: true
stop_loss_pct: -3.0
take_profit_pct: 5.0
tools:
- get_universe
- get_history
- get_technicals
- get_recent_news
model_assignment:
  wide_scoring: haiku
  deep_analysis: sonnet
  final_select: sonnet
runs_in:
- region: us
  tier: alpaca-paper
  alpaca_slot: 2
  universe: sp1500
- region: uk-eu
  tier: trading212-paper
  t212_slot: 1
  universe: uk_eu_extended
# Phase 8C — drop candidates with earnings inside the window. Technical
# signal becomes unreliable across a binary print, so we avoid the day.
skip_if_earnings_in_days: 1
tier2_candidate: true
tier2_marked_at: '2026-05-21'
tier2_thesis: "US n=10 hit 60% IC 0.19 (lower 0.12) shows real signal; UK side bleeding but cost-driven not signal-driven. Both regions on Tier 1 — strong T2 candidate once UK costs are tuned out."
# LLM strategies use the Sonnet-driven per-strategy pre-filter so the
# universe is narrowed with the strategy's lens before the expensive
# technicals fetch + Stage-1 Haiku scoring. See prompts/prefilter.md
# for this strategy's filter prompt. Tunable by evolution agent.
prefilter_mode: llm
prefilter_top_n: 100
