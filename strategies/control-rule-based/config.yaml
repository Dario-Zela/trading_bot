id: control-rule-based
display_name: "Control \u2014 rule-based gainers"
description: "Deterministic baseline. Buys top-N highest previous-day % gainers from\
  \ the\nconfigured universe, equal weight, no stops, no take-profits. No LLM\ninvolvement.\
  \ Region-agnostic \u2014 runs against S&P 500 in the US pipeline and\nagainst UK\
  \ + EU blue chips in the UK/EU pipeline. The yardstick every\nother strategy must\
  \ beat in each region.\n"
implementation: rule_based
active: true
capital_gbp: 10000
max_positions: 5
max_position_pct: 30
min_position_gbp: 50
use_stops: false
use_take_profits: false
runs_in:
- region: us
  tier: shadow
  universe: t212_isa_us
- region: uk-eu
  tier: shadow
  universe: t212_isa_uk_eu
skip_if_earnings_in_days: 1
prefilter_mode: 'off'
stop_loss_pct: -8.0
take_profit_pct: 5.0
last_tune_date: '2026-05-30'
