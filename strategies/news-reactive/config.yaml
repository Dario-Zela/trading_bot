id: news-reactive
display_name: News reactive
description: "LLM-driven. Weights earnings surprises, M&A, guidance changes, and other\n\
  catalysts. News routing per ticker: Alpaca News for US-listed names,\nyfinance fallback\
  \ for UK/EU listings \u2014 coverage is decent everywhere.\n"
implementation: llm
active: true
capital_gbp: 10000
max_positions: 5
max_position_pct: 30
min_position_gbp: 50
use_stops: true
use_take_profits: true
stop_loss_pct: -3.0
take_profit_pct: 3.0
last_tune_date: '2026-05-30'
tools:
- get_universe
- get_history
- get_recent_news
- get_earnings_info
- get_filing_summary
- get_insider_trades
- get_daily_news_brief
model_assignment:
  wide_scoring: haiku
  deep_analysis: sonnet
  final_select: sonnet
runs_in:
- region: us
  tier: alpaca-paper
  alpaca_slot: 1
  universe: t212_isa_us
  tier2_candidate: true
  tier2_marked_at: '2026-05-30'
  tier2_thesis: IC 0.303 / n=299 is the only sleeve above the shadow T2 evidence
    floor (IC ≥ 0.25, n ≥ 200); promoted into the Alpaca slot freed by
    momentum-trader@us demote so we can stress-test fee-net P&L against the
    new 2.0x cost gate.
- region: uk-eu
  tier: shadow
  t212_slot: null
  universe: t212_isa_uk_eu
prefilter_mode: llm
prefilter_top_n: 100
cost_gate_multiplier: 2.0
