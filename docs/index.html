<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Bot Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    :root {
      --positive: #16a34a;
      --negative: #dc2626;
      --neutral: var(--pico-muted-color);
      --accent: var(--pico-primary);
      --card-shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.04);
      --card-shadow-hover: 0 4px 8px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.06);
    }
    [data-theme="dark"] {
      --positive: #22c55e;
      --negative: #f87171;
      --card-shadow: 0 1px 3px rgba(0,0,0,0.4);
      --card-shadow-hover: 0 4px 8px rgba(0,0,0,0.5);
    }
    body { margin: 0; }
    .app { max-width: 1280px; margin: 0 auto; padding: 1.5rem 2rem; }

    /* Header */
    .topbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
      margin-bottom: 1.5rem;
    }
    .topbar h1 {
      margin: 0;
      font-size: 1.3rem;
      letter-spacing: -0.01em;
    }
    .topbar .spacer { flex: 1; }
    .topbar .meta {
      font-size: 0.8rem;
      color: var(--pico-muted-color);
    }
    .theme-toggle {
      background: none;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 6px;
      width: 36px;
      height: 36px;
      padding: 0;
      cursor: pointer;
      font-size: 1rem;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--pico-muted-border-color);
      margin-bottom: 1rem;
    }
    .tab {
      background: none;
      border: none;
      padding: 0.6rem 1.2rem;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--pico-muted-color);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab .count {
      display: inline-block;
      background: rgba(100, 116, 139, 0.16);
      color: #475569;
      border-radius: 10px;
      padding: 0.05rem 0.5rem;
      font-size: 0.75rem;
      margin-left: 0.4rem;
      font-weight: 600;
    }
    [data-theme="dark"] .tab .count {
      background: rgba(148, 163, 184, 0.22);
      color: #e2e8f0;
    }
    .tab.active .count {
      background: var(--accent);
      color: var(--pico-primary-inverse);
    }
    .region-toggle {
      margin-left: auto;
      display: flex;
      gap: 0.25rem;
      align-items: center;
    }
    .region-btn {
      background: none;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 6px;
      padding: 0.3rem 0.7rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--pico-muted-color);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .region-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    .region-btn.active {
      background: var(--accent);
      color: var(--pico-primary-inverse);
      border-color: var(--accent);
    }

    /* Global overview cards */
    .overview-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .overview-card {
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin: 0;
      box-shadow: var(--card-shadow);
    }
    .overview-card header {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
      margin-bottom: 0.85rem;
      padding: 0;
      border: none;
    }
    .overview-card header strong {
      font-size: 0.95rem;
      letter-spacing: -0.01em;
    }
    .overview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .overview-card .big {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .overview-card .small { font-size: 0.7rem; }
    .overview-card .muted { color: var(--pico-muted-color); font-size: 0.78rem; }

    /* Search */
    .search-row {
      margin-bottom: 1.5rem;
    }
    .search-row input {
      max-width: 360px;
      font-size: 0.9rem;
      margin: 0;
    }

    /* Strategy grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .card {
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 8px;
      padding: 1rem;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: var(--card-shadow);
    }
    .card:hover {
      transform: translateY(-1px);
      box-shadow: var(--card-shadow-hover);
      border-color: var(--accent);
    }
    .card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent);
    }
    .card-name {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }
    .card-badges {
      display: flex;
      gap: 0.3rem;
      margin-bottom: 1rem;
    }
    .badge {
      font-size: 0.65rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.15rem 0.55rem;
      border-radius: 3px;
      background: rgba(100, 116, 139, 0.14);
      color: #475569;
      font-weight: 600;
    }
    [data-theme="dark"] .badge {
      background: rgba(148, 163, 184, 0.2);
      color: #e2e8f0;
    }
    .badge.tier-shadow { background: rgba(100, 116, 139, 0.18); color: #475569; }
    .badge.tier-alpaca-paper { background: rgba(59, 130, 246, 0.18); color: #1d4ed8; }
    .badge.tier-t212-live { background: rgba(168, 85, 247, 0.18); color: #7e22ce; }
    .badge.region-us { background: rgba(220, 38, 38, 0.14); color: #b91c1c; }
    .badge.region-uk-eu { background: rgba(37, 99, 235, 0.16); color: #1d4ed8; }
    [data-theme="dark"] .badge.tier-shadow { color: #cbd5e1; }
    [data-theme="dark"] .badge.tier-alpaca-paper { color: #93c5fd; }
    [data-theme="dark"] .badge.tier-t212-live { color: #d8b4fe; }
    [data-theme="dark"] .badge.region-us { color: #fca5a5; }
    [data-theme="dark"] .badge.region-uk-eu { color: #93c5fd; }
    .card-pnl {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 0.1rem;
    }
    .card-pnl-pct {
      font-size: 0.85rem;
      color: var(--pico-muted-color);
      margin-bottom: 0.9rem;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--pico-muted-color);
      padding-top: 0.75rem;
      border-top: 1px solid var(--pico-muted-border-color);
    }
    .positive { color: var(--positive); }
    .negative { color: var(--negative); }

    /* Detail panel */
    .detail {
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .detail-header h2 {
      margin: 0 0 0.25rem;
      font-size: 1.25rem;
      letter-spacing: -0.01em;
    }
    .detail-header .desc {
      color: var(--pico-muted-color);
      font-size: 0.85rem;
      margin: 0 0 1.25rem;
      line-height: 1.5;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .stat {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      background: var(--pico-background-color);
      border: 1px solid var(--pico-muted-border-color);
    }
    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--pico-muted-color);
      margin-bottom: 0.25rem;
    }
    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    /* Chart */
    .chart-box {
      position: relative;
      height: 240px;
      margin-bottom: 1.5rem;
      background: var(--pico-background-color);
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 6px;
      padding: 1rem;
    }

    /* Sub-tabs (Executed / Uncommitted) */
    .subtabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .subtab {
      background: none;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 6px;
      padding: 0.4rem 0.9rem;
      font-size: 0.85rem;
      color: var(--pico-muted-color);
      cursor: pointer;
    }
    .subtab.active {
      background: var(--accent);
      color: var(--pico-primary-inverse);
      border-color: var(--accent);
    }

    /* Tables */
    table { font-size: 0.85rem; margin-bottom: 0; }
    th { font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--pico-muted-color); }
    td { padding: 0.5rem 0.6rem; }
    .reason-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-weight: 600;
      background: rgba(100, 116, 139, 0.16);
      color: #475569;
    }
    .reason-badge.stop { background: rgba(220, 38, 38, 0.15); color: #b91c1c; }
    .reason-badge.take_profit { background: rgba(22, 163, 74, 0.15); color: #15803d; }
    .reason-badge.scheduled { background: rgba(100, 116, 139, 0.16); color: #475569; }
    .reason-badge.cancelled { background: rgba(217, 119, 6, 0.16); color: #b45309; }
    .reason-badge.cleared { background: rgba(124, 58, 237, 0.16); color: #6d28d9; }
    [data-theme="dark"] .reason-badge { background: rgba(148, 163, 184, 0.2); color: #e2e8f0; }
    [data-theme="dark"] .reason-badge.stop { color: #fca5a5; }
    [data-theme="dark"] .reason-badge.take_profit { color: #86efac; }
    [data-theme="dark"] .reason-badge.scheduled { color: #cbd5e1; }
    [data-theme="dark"] .reason-badge.cancelled { background: rgba(251, 191, 36, 0.18); color: #fbbf24; }
    [data-theme="dark"] .reason-badge.cleared { background: rgba(196, 181, 253, 0.18); color: #c4b5fd; }
    .why-toggle {
      color: var(--accent);
      cursor: pointer;
      font-size: 0.8rem;
      user-select: none;
    }
    .expanded {
      background: var(--pico-code-background-color);
      padding: 1rem 1.2rem;
      font-size: 0.85rem;
      border-left: 3px solid var(--accent);
    }
    .expanded strong {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--pico-muted-color);
      display: block;
      margin-bottom: 0.25rem;
    }
    .expanded p { margin: 0 0 0.75rem; line-height: 1.5; }
    .expanded p:last-child { margin-bottom: 0; }

    .empty {
      color: var(--pico-muted-color);
      font-style: italic;
      text-align: center;
      padding: 3rem 1rem;
    }

    .pred-class-badge {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
      font-weight: 600;
    }
    .pred-class-badge.strong_up { background: rgba(22, 163, 74, 0.25); color: #15803d; }
    .pred-class-badge.mild_up { background: rgba(22, 163, 74, 0.14); color: #15803d; }
    .pred-class-badge.flat { background: rgba(100, 116, 139, 0.16); color: #475569; }
    .pred-class-badge.mild_down { background: rgba(220, 38, 38, 0.14); color: #b91c1c; }
    .pred-class-badge.strong_down { background: rgba(220, 38, 38, 0.25); color: #b91c1c; }
    [data-theme="dark"] .pred-class-badge.strong_up { color: #86efac; }
    [data-theme="dark"] .pred-class-badge.mild_up { color: #86efac; }
    [data-theme="dark"] .pred-class-badge.flat { background: rgba(148, 163, 184, 0.2); color: #cbd5e1; }
    [data-theme="dark"] .pred-class-badge.mild_down { color: #fca5a5; }
    [data-theme="dark"] .pred-class-badge.strong_down { color: #fca5a5; }

    @media (max-width: 700px) {
      .app { padding: 1rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app" x-data="dashboard()" x-init="load()">
    <header class="topbar">
      <h1>⚡ Trading Bot</h1>
      <div class="spacer"></div>
      <span class="meta">
        Last updated <span x-text="formatTimestamp(data.generated_at)"></span>
      </span>
      <button class="theme-toggle" @click="toggleTheme()" :title="theme === 'light' ? 'Switch to dark' : 'Switch to light'">
        <span x-text="theme === 'light' ? '🌙' : '☀️'"></span>
      </button>
    </header>

    <nav class="tabs">
      <button class="tab" :class="{ active: tab === 'active' }" @click="tab = 'active'; selected = null">
        Active <span class="count" x-text="filterByRegion(data.active).length"></span>
      </button>
      <button class="tab" :class="{ active: tab === 'archived' }" @click="tab = 'archived'; selected = null">
        Archived <span class="count" x-text="filterByRegion(data.archived).length"></span>
      </button>

      <div class="region-toggle">
        <template x-for="r in regionsAvailable" :key="r">
          <button
            class="region-btn"
            :class="{ active: region === r }"
            @click="setRegion(r)"
            x-text="regionLabel(r)"
          ></button>
        </template>
        <template x-if="regionsAvailable.length > 1">
          <button
            class="region-btn"
            :class="{ active: region === 'all' }"
            @click="setRegion('all')"
          >All</button>
        </template>
      </div>
    </nav>

    <div class="search-row">
      <input type="search" placeholder="Search strategies by name or description…" x-model="search" />
    </div>

    <!-- Global overview: separates real broker fills from shadow simulation -->
    <template x-if="data && data.global_overview">
      <section class="overview-row">
        <article class="overview-card">
          <header>
            <strong>Real broker (paper)</strong>
            <span class="muted" x-text="(data.global_overview.real_broker.tiers || []).join(' + ') || '—'"></span>
          </header>
          <div class="overview-grid">
            <div>
              <div class="muted small">Today</div>
              <div class="big" :class="pnlClass(data.global_overview.real_broker.today_pnl_gbp)"
                   x-text="formatGbp(data.global_overview.real_broker.today_pnl_gbp)"></div>
              <div class="muted small" x-text="data.global_overview.real_broker.today_n_trades + ' trades'"></div>
            </div>
            <div>
              <div class="muted small">All-time</div>
              <div class="big" :class="pnlClass(data.global_overview.real_broker.alltime_pnl_gbp)"
                   x-text="formatGbp(data.global_overview.real_broker.alltime_pnl_gbp)"></div>
              <div class="muted small">
                <span x-text="data.global_overview.real_broker.alltime_n_trades + ' trades'"></span>
                <template x-if="data.global_overview.real_broker.alltime_hit_rate !== null">
                  <span> · <span x-text="(data.global_overview.real_broker.alltime_hit_rate * 100).toFixed(1) + '% hit'"></span></span>
                </template>
              </div>
            </div>
          </div>
        </article>
        <article class="overview-card">
          <header>
            <strong>Shadow (simulation)</strong>
            <span class="muted">yfinance close-price simulation, no orders placed</span>
          </header>
          <div class="overview-grid">
            <div>
              <div class="muted small">Today</div>
              <div class="big" :class="pnlClass(data.global_overview.shadow_simulation.today_pnl_gbp)"
                   x-text="formatGbp(data.global_overview.shadow_simulation.today_pnl_gbp)"></div>
              <div class="muted small" x-text="data.global_overview.shadow_simulation.today_n_trades + ' trades'"></div>
            </div>
            <div>
              <div class="muted small">All-time</div>
              <div class="big" :class="pnlClass(data.global_overview.shadow_simulation.alltime_pnl_gbp)"
                   x-text="formatGbp(data.global_overview.shadow_simulation.alltime_pnl_gbp)"></div>
              <div class="muted small">
                <span x-text="data.global_overview.shadow_simulation.alltime_n_trades + ' trades'"></span>
                <template x-if="data.global_overview.shadow_simulation.alltime_hit_rate !== null">
                  <span> · <span x-text="(data.global_overview.shadow_simulation.alltime_hit_rate * 100).toFixed(1) + '% hit'"></span></span>
                </template>
              </div>
            </div>
          </div>
        </article>
      </section>
    </template>

    <div class="grid">
      <template x-for="s in filteredStrategies" :key="s.key || s.id">
        <div class="card" :class="{ selected: selected === (s.key || s.id) }" @click="selectStrategy(s.key || s.id)">
          <div class="card-name" x-text="s.display_name"></div>
          <div class="card-badges">
            <span class="badge" :class="'tier-' + s.tier" x-text="s.tier"></span>
            <span class="badge" :class="'region-' + s.region" x-text="s.region"></span>
          </div>
          <div class="card-pnl" :class="pnlClass(s.summary.total_pnl_gbp)" x-text="formatGbp(s.summary.total_pnl_gbp)"></div>
          <div class="card-pnl-pct" :class="pnlClass(s.summary.avg_pnl_pct)">
            <span x-text="formatPct(s.summary.avg_pnl_pct)"></span> avg / trade
          </div>
          <div class="card-meta">
            <span><span x-text="s.summary.n_closed"></span> closed</span>
            <span><span x-text="(s.summary.hit_rate * 100).toFixed(0)"></span>% hit rate</span>
          </div>
        </div>
      </template>
      <template x-if="filteredStrategies.length === 0">
        <div class="empty" style="grid-column: 1 / -1;">
          <template x-if="search">No strategies match &quot;<span x-text="search"></span>&quot;.</template>
          <template x-if="!search">No <span x-text="tab"></span> strategies.</template>
        </div>
      </template>
    </div>

    <template x-if="current">
      <section class="detail">
        <div class="detail-header">
          <h2 x-text="current.display_name"></h2>
          <p class="desc" x-text="current.description"></p>
        </div>

        <div class="stat-grid">
          <div class="stat">
            <div class="stat-label">Total P&L</div>
            <div class="stat-value" :class="pnlClass(current.summary.total_pnl_gbp)" x-text="formatGbp(current.summary.total_pnl_gbp)"></div>
          </div>
          <div class="stat">
            <div class="stat-label">Avg P&L %</div>
            <div class="stat-value" :class="pnlClass(current.summary.avg_pnl_pct)" x-text="formatPct(current.summary.avg_pnl_pct)"></div>
          </div>
          <div class="stat">
            <div class="stat-label">Hit rate</div>
            <div class="stat-value" x-text="(current.summary.hit_rate * 100).toFixed(1) + '%'"></div>
          </div>
          <div class="stat">
            <div class="stat-label">Closed trades</div>
            <div class="stat-value" x-text="current.summary.n_closed"></div>
          </div>
          <div class="stat">
            <div class="stat-label">Open positions</div>
            <div class="stat-value" x-text="current.summary.n_open"></div>
          </div>
          <div class="stat">
            <div class="stat-label">Predictions logged</div>
            <div class="stat-value" x-text="current.summary.n_predictions"></div>
          </div>
        </div>

        <div class="chart-box">
          <canvas id="equity-chart"></canvas>
        </div>

        <div class="subtabs">
          <button class="subtab" :class="{ active: subtab === 'executed' }" @click="subtab = 'executed'; expanded = null">
            Executed (<span x-text="current.executed.length"></span>)
          </button>
          <button class="subtab" :class="{ active: subtab === 'uncommitted' }" @click="subtab = 'uncommitted'; expanded = null">
            Uncommitted candidates (<span x-text="current.uncommitted.length"></span>)
          </button>
        </div>

        <template x-if="subtab === 'executed'">
          <div>
            <template x-if="current.executed.length === 0">
              <div class="empty">No trades yet.</div>
            </template>
            <template x-if="current.executed.length > 0">
              <table>
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Ticker</th>
                    <th>Entry</th>
                    <th>Exit</th>
                    <th>P&L £</th>
                    <th>P&L %</th>
                    <th>Reason</th>
                    <th></th>
                  </tr>
                </thead>
                <template x-for="(t, i) in current.executed" :key="t.trade_id">
                  <tbody>
                    <tr>
                      <td x-text="t.entry_date"></td>
                      <td><strong x-text="t.ticker"></strong></td>
                      <td x-text="'$' + t.entry_price.toFixed(2)"></td>
                      <td x-text="t.exit_price ? '$' + t.exit_price.toFixed(2) : '—'"></td>
                      <td :class="pnlClass(t.pnl_gbp)" x-text="formatGbp(t.pnl_gbp)"></td>
                      <td :class="pnlClass(t.pnl_pct)" x-text="formatPct(t.pnl_pct)"></td>
                      <td><span class="reason-badge" :class="t.exit_reason" x-text="t.exit_reason"></span></td>
                      <td>
                        <span class="why-toggle" @click="expanded = (expanded === t.trade_id) ? null : t.trade_id"
                              x-text="expanded === t.trade_id ? 'hide' : 'why?'"></span>
                      </td>
                    </tr>
                    <tr x-show="expanded === t.trade_id">
                      <td colspan="8" class="expanded">
                        <strong>Why entered</strong>
                        <p x-text="t.thesis || '(no thesis recorded)'"></p>
                        <template x-if="t.outcome_notes">
                          <div>
                            <strong style="color:#0369a1;">What happened</strong>
                            <p x-text="t.outcome_notes"></p>
                          </div>
                        </template>
                        <template x-if="t.risks_observed">
                          <div>
                            <strong style="color:#b45309;">⚠ Risks observed</strong>
                            <p x-text="t.risks_observed"></p>
                          </div>
                        </template>
                      </td>
                    </tr>
                  </tbody>
                </template>
              </table>
            </template>
          </div>
        </template>

        <template x-if="subtab === 'uncommitted'">
          <div>
            <template x-if="current.uncommitted.length === 0">
              <div class="empty">No uncommitted predictions yet (Wave 1 strategies don't generate them — they arrive with LLM strategies).</div>
            </template>
            <template x-if="current.uncommitted.length > 0">
              <table>
                <thead>
                  <tr>
                    <th>Date</th>
                    <th>Ticker</th>
                    <th>Class</th>
                    <th>Predicted %</th>
                    <th>Actual %</th>
                    <th>Conviction</th>
                    <th></th>
                  </tr>
                </thead>
                <template x-for="(p, i) in current.uncommitted.slice(0, 30)" :key="i">
                  <tbody>
                    <tr>
                      <td x-text="p.prediction_date"></td>
                      <td><strong x-text="p.ticker"></strong></td>
                      <td><span class="pred-class-badge" :class="p.predicted_class" x-text="p.predicted_class.replace('_', ' ')"></span></td>
                      <td :class="pnlClass(p.predicted_return_pct)" x-text="formatPct(p.predicted_return_pct)"></td>
                      <td :class="pnlClass(p.actual_return_pct)" x-text="p.actual_return_pct != null ? formatPct(p.actual_return_pct) : '—'"></td>
                      <td x-text="p.conviction.toFixed(2)"></td>
                      <td>
                        <span class="why-toggle" @click="expanded = (expanded === 'p' + i) ? null : 'p' + i"
                              x-text="expanded === 'p' + i ? 'hide' : 'why?'"></span>
                      </td>
                    </tr>
                    <tr x-show="expanded === 'p' + i">
                      <td colspan="7" class="expanded">
                        <strong>Rationale</strong>
                        <p x-text="p.rationale"></p>
                      </td>
                    </tr>
                  </tbody>
                </template>
              </table>
            </template>
          </div>
        </template>
      </section>
    </template>

    <template x-if="!current && filteredStrategies.length > 0">
      <div class="empty" style="margin-top: 2rem;">
        Click a strategy above to see details.
      </div>
    </template>
  </div>

  <script>
    function dashboard() {
      return {
        data: { active: [], archived: [], regions: [], generated_at: null },
        tab: 'active',
        region: localStorage.getItem('region') || 'us',
        search: '',
        selected: null,
        subtab: 'executed',
        expanded: null,
        theme: localStorage.getItem('theme') || 'light',
        chartInstance: null,

        async load() {
          document.documentElement.setAttribute('data-theme', this.theme);
          try {
            const response = await fetch('data.json', { cache: 'no-store' });
            this.data = await response.json();
          } catch (e) {
            console.error('Failed to load data.json', e);
          }
        },

        get regionsAvailable() {
          return (this.data.regions && this.data.regions.length) ? this.data.regions : ['us'];
        },

        regionLabel(r) {
          if (r === 'us') return 'US';
          if (r === 'uk-eu') return 'UK/EU';
          return r.toUpperCase();
        },

        filterByRegion(pool) {
          if (this.region === 'all') return pool;
          return pool.filter(s => s.region === this.region);
        },

        get filteredStrategies() {
          const base = this.tab === 'active' ? this.data.active : this.data.archived;
          const pool = this.filterByRegion(base);
          const q = this.search.trim().toLowerCase();
          if (!q) return pool;
          return pool.filter(s =>
            s.display_name.toLowerCase().includes(q) ||
            s.id.toLowerCase().includes(q) ||
            (s.description || '').toLowerCase().includes(q)
          );
        },

        get current() {
          const all = [...this.data.active, ...this.data.archived];
          return all.find(s => (s.key || s.id) === this.selected) || null;
        },

        selectStrategy(key) {
          this.selected = this.selected === key ? null : key;
          this.subtab = 'executed';
          this.expanded = null;
          this.$nextTick(() => {
            if (this.current) this.renderChart(this.current);
          });
        },

        setRegion(r) {
          this.region = r;
          localStorage.setItem('region', r);
          this.selected = null;
        },

        toggleTheme() {
          this.theme = this.theme === 'light' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', this.theme);
          localStorage.setItem('theme', this.theme);
          if (this.current) this.$nextTick(() => this.renderChart(this.current));
        },

        renderChart(strategy) {
          const canvas = document.getElementById('equity-chart');
          if (!canvas) return;
          if (this.chartInstance) this.chartInstance.destroy();

          const points = strategy.equity_curve || [];
          const labels = points.map(p => p.date || 'start');
          const values = points.map(p => p.equity);
          const isDark = this.theme === 'dark';
          const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
          const tickColor = isDark ? '#94a3b8' : '#64748b';
          const lineColor = (values[values.length - 1] >= values[0]) ? '#16a34a' : '#dc2626';

          this.chartInstance = new Chart(canvas, {
            type: 'line',
            data: {
              labels,
              datasets: [{
                label: 'Equity (£)',
                data: values,
                borderColor: lineColor,
                backgroundColor: lineColor + '22',
                tension: 0.25,
                fill: true,
                pointRadius: 0,
                pointHoverRadius: 4,
                borderWidth: 2,
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              interaction: { mode: 'index', intersect: false },
              plugins: { legend: { display: false } },
              scales: {
                x: { grid: { color: gridColor }, ticks: { color: tickColor, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 } },
                y: { grid: { color: gridColor }, ticks: { color: tickColor, callback: v => '£' + v.toLocaleString() } }
              }
            }
          });
        },

        pnlClass(v) {
          if (v == null) return '';
          if (v > 0) return 'positive';
          if (v < 0) return 'negative';
          return '';
        },

        formatGbp(v) {
          if (v == null) return '—';
          const sign = v > 0 ? '+' : v < 0 ? '−' : '';
          return sign + '£' + Math.abs(v).toFixed(2);
        },

        formatPct(v) {
          if (v == null) return '—';
          const sign = v > 0 ? '+' : v < 0 ? '−' : '';
          return sign + Math.abs(v).toFixed(2) + '%';
        },

        formatTimestamp(ts) {
          if (!ts) return 'never';
          try {
            return new Date(ts).toLocaleString();
          } catch { return ts; }
        },
      };
    }
  </script>
</body>
</html>
