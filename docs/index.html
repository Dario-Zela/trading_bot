<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — The Bot Tribune</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,600;0,800;1,400&family=Crimson+Pro:ital,wght@0,400;0,600;0,800;1,400&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="page-dashboard" x-data="dashboard()" x-init="load()">

  <nav class="app-nav">
    <span class="brand">⚡ TRADING BOT</span>
    <a class="nav-tab active" href="index.html">Dashboard</a>
    <a class="nav-tab" href="news/latest.html">News</a>
    <a class="nav-tab" href="macro/latest.html">Macro</a>
    <a class="nav-tab" href="evolution.html">Evolution</a>
    <span class="spacer"></span>
    <div class="font-picker">
      <span class="label">Font</span>
      <button data-font="classic">Classic</button>
      <button data-font="newsreader">Newsreader</button>
      <button data-font="crimson">Crimson</button>
      <button data-font="lora">Lora</button>
    </div>
  </nav>

  <main class="paper">

    <header class="masthead">
      <h1>The Bot Tribune<span class="sub">— Live performance</span></h1>
      <div style="font-family: var(--sans); font-size: 0.78rem; color: var(--ink-muted); letter-spacing: 0.05em;">
        Last updated <strong x-text="formatTimestamp(data.generated_at)" style="color: var(--ink);"></strong>
        ·
        <span x-text="data.active && data.active.length"></span> active strategies
        ·
        <span x-text="regionsAvailable.length"></span> regions
      </div>
    </header>

    <!-- Filter strip: tabs (active/archived) + region toggle + search -->
    <div class="filters" style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; padding: 0.75rem 0 1.5rem; border-bottom: 1px solid var(--hairline); margin-bottom: 1.5rem;">
      <div class="filter-group">
        <button class="filter-btn" :class="{ active: tab === 'active' }"
                @click="tab = 'active'; selected = null">
          Active <span style="opacity:.6">(<span x-text="filterByRegion(data.active || []).length"></span>)</span>
        </button>
        <button class="filter-btn" :class="{ active: tab === 'archived' }"
                @click="tab = 'archived'; selected = null">
          Archived <span style="opacity:.6">(<span x-text="filterByRegion(data.archived || []).length"></span>)</span>
        </button>
      </div>

      <div class="filter-group">
        <template x-for="r in regionsAvailable" :key="r">
          <button class="filter-btn" :class="{ active: region === r }"
                  @click="setRegion(r)" x-text="regionLabel(r)"></button>
        </template>
        <template x-if="regionsAvailable.length > 1">
          <button class="filter-btn" :class="{ active: region === 'all' }"
                  @click="setRegion('all')">All</button>
        </template>
      </div>

      <input type="search" class="search" placeholder="Search strategies…" x-model="search">
    </div>

    <!-- Overview cards: broker vs shadow, reactive to filters -->
    <template x-if="data">
      <section class="overview-row">
        <div class="overview-card broker">
          <div class="overview-head">
            <span class="overview-title">Real broker (paper)</span>
            <span class="overview-tiers" x-text="overview.real.tiers.join(' + ') || 'no real-broker strategies'"></span>
          </div>
          <div class="overview-stats">
            <div class="overview-stat">
              <div class="overview-stat-label">Today</div>
              <div class="overview-stat-pnl" :class="pnlClass(overview.real.todayPnl)"
                   x-text="formatGbp(overview.real.todayPnl)"></div>
              <div class="overview-stat-meta" x-text="overview.real.todayN + ' trades'"></div>
            </div>
            <div class="overview-stat">
              <div class="overview-stat-label">All-time</div>
              <div class="overview-stat-pnl" :class="pnlClass(overview.real.alltimePnl)"
                   x-text="formatGbp(overview.real.alltimePnl)"></div>
              <div class="overview-stat-meta">
                <span x-text="overview.real.alltimeN + ' trades'"></span>
                <template x-if="overview.real.hitRate !== null">
                  <span> · <span x-text="(overview.real.hitRate * 100).toFixed(1) + '% hit'"></span></span>
                </template>
              </div>
            </div>
          </div>
        </div>
        <div class="overview-card shadow">
          <div class="overview-head">
            <span class="overview-title">Shadow (simulation)</span>
            <span class="overview-tiers">yfinance · no orders placed</span>
          </div>
          <div class="overview-stats">
            <div class="overview-stat">
              <div class="overview-stat-label">Today</div>
              <div class="overview-stat-pnl" :class="pnlClass(overview.shadow.todayPnl)"
                   x-text="formatGbp(overview.shadow.todayPnl)"></div>
              <div class="overview-stat-meta" x-text="overview.shadow.todayN + ' trades'"></div>
            </div>
            <div class="overview-stat">
              <div class="overview-stat-label">All-time</div>
              <div class="overview-stat-pnl" :class="pnlClass(overview.shadow.alltimePnl)"
                   x-text="formatGbp(overview.shadow.alltimePnl)"></div>
              <div class="overview-stat-meta">
                <span x-text="overview.shadow.alltimeN + ' trades'"></span>
                <template x-if="overview.shadow.hitRate !== null">
                  <span> · <span x-text="(overview.shadow.hitRate * 100).toFixed(1) + '% hit'"></span></span>
                </template>
              </div>
            </div>
          </div>
        </div>
      </section>
    </template>

    <!-- Sector exposure on currently-open positions (live-tier only) -->
    <template x-if="data && data.sector_exposure && data.sector_exposure.by_sector && data.sector_exposure.by_sector.length">
      <section style="margin: 1.5rem 0 2rem; padding: 1rem 1.4rem; background: var(--card); border: 1px solid var(--hairline); border-radius: 6px;">
        <div style="font-family: var(--sans); font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 0.6rem;">
          Sector exposure · <span x-text="data.sector_exposure.n_positions"></span> open position(s)
        </div>
        <div style="display: flex; gap: 0.4rem; height: 28px; border-radius: 2px; overflow: hidden;">
          <template x-for="row in data.sector_exposure.by_sector" :key="row.sector">
            <div :style="'flex-basis: ' + row.pct + '%; background: ' + sectorColor(row.sector) + '; color: white; font-family: var(--sans); font-size: 0.7rem; line-height: 28px; text-align: center; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 0.4rem;'"
                 :title="row.sector + ': ' + row.pct + '%'"
                 x-text="row.pct >= 8 ? (row.sector + ' ' + row.pct + '%') : ''"></div>
          </template>
        </div>
        <div style="margin-top: 0.6rem; font-family: var(--sans); font-size: 0.72rem; color: var(--ink-muted);">
          <template x-for="row in data.sector_exposure.by_sector" :key="row.sector">
            <span style="margin-right: 1.2rem;">
              <span :style="'display:inline-block; width:8px; height:8px; border-radius:2px; background:' + sectorColor(row.sector) + '; margin-right:4px;'"></span>
              <span x-text="row.sector + ' ' + row.pct + '%'"></span>
            </span>
          </template>
        </div>
      </section>
    </template>

    <!-- The slate: strategy cards -->
    <div class="section-label plain">
      <span>The slate</span>
      <span class="ord">click a card to expand · <span x-text="filteredStrategies.length"></span> in view</span>
    </div>

    <div class="strategy-grid">
      <template x-for="s in filteredStrategies" :key="s.key || s.id">
        <div class="strategy-card-tile" :class="{ selected: selected === (s.key || s.id) }"
             @click="selectStrategy(s.key || s.id)">
          <div class="card-name" x-text="s.display_name"></div>
          <div class="card-badges">
            <span class="badge" :class="'tier-' + s.tier" x-text="s.tier"></span>
            <span class="badge" :class="'region-' + s.region" x-text="s.region"></span>
          </div>
          <div class="card-pnl" :class="pnlClass(s.summary.total_pnl_gbp)"
               x-text="formatGbp(s.summary.total_pnl_gbp)"></div>
          <div class="card-pnl-pct">
            <span x-text="formatPct(s.summary.avg_pnl_pct)"></span> avg / trade
          </div>
          <div class="card-meta">
            <span><span x-text="s.summary.n_closed"></span> closed</span>
            <span><span x-text="(s.summary.hit_rate * 100).toFixed(0)"></span>% hit</span>
          </div>
        </div>
      </template>
      <template x-if="filteredStrategies.length === 0">
        <div style="grid-column: 1 / -1; padding: 2rem; text-align: center; font-family: var(--serif-body); font-style: italic; color: var(--ink-muted);">
          <template x-if="search">No strategies match &quot;<span x-text="search"></span>&quot;.</template>
          <template x-if="!search">No <span x-text="tab"></span> strategies.</template>
        </div>
      </template>
    </div>

    <!-- Detail panel -->
    <template x-if="current">
      <section class="detail">
        <div class="detail-header">
          <div>
            <h2 x-text="current.display_name"></h2>
            <p class="desc" x-text="current.description"></p>
          </div>
          <div class="right">
            <div class="pnl" :class="pnlClass(current.summary.total_pnl_gbp)"
                 x-text="formatGbp(current.summary.total_pnl_gbp)"></div>
            <div class="pnl-meta">
              All-time · <span x-text="current.tier"></span> · slot
              <span x-text="current.alpaca_slot || current.t212_slot || '—'"></span>
            </div>
          </div>
        </div>

        <div class="stat-grid">
          <div class="stat">
            <div class="stat-label">Trades</div>
            <div class="stat-value" x-text="current.summary.n_closed"></div>
          </div>
          <div class="stat">
            <div class="stat-label">Hit rate</div>
            <div class="stat-value" x-text="(current.summary.hit_rate * 100).toFixed(1) + '%'"></div>
          </div>
          <div class="stat">
            <div class="stat-label">Avg P&amp;L %</div>
            <div class="stat-value" :class="pnlClass(current.summary.avg_pnl_pct)"
                 x-text="formatPct(current.summary.avg_pnl_pct)"></div>
          </div>
          <div class="stat">
            <div class="stat-label">Open</div>
            <div class="stat-value" x-text="current.summary.n_open"></div>
          </div>
          <div class="stat">
            <div class="stat-label">Predictions</div>
            <div class="stat-value" x-text="current.summary.n_predictions"></div>
          </div>
        </div>

        <div class="chart-wrap">
          <canvas id="equity-chart"></canvas>
        </div>

        <div class="sub-tabs">
          <button class="sub-tab" :class="{ active: subtab === 'executed' }"
                  @click="subtab = 'executed'; expanded = null">
            Executed (<span x-text="current.executed.length"></span>)
          </button>
          <button class="sub-tab" :class="{ active: subtab === 'uncommitted' }"
                  @click="subtab = 'uncommitted'; expanded = null">
            Uncommitted candidates (<span x-text="current.uncommitted.length"></span>)
          </button>
        </div>

        <template x-if="subtab === 'executed'">
          <div>
            <template x-if="current.executed.length === 0">
              <div style="padding: 1.5rem; text-align: center; font-style: italic; color: var(--ink-muted);">No trades yet.</div>
            </template>
            <template x-if="current.executed.length > 0">
              <table class="trades-table">
                <thead>
                  <tr>
                    <th>Date</th><th>Ticker</th><th>Entry</th><th>Exit</th>
                    <th>P&amp;L £</th><th>Fees</th><th>P&amp;L %</th><th>Reason</th><th></th>
                  </tr>
                </thead>
                <template x-for="t in current.executed" :key="t.trade_id">
                  <tbody>
                    <tr>
                      <td x-text="t.entry_date"></td>
                      <td class="ticker" x-text="t.ticker"></td>
                      <td x-text="'$' + t.entry_price.toFixed(2)"></td>
                      <td x-text="t.exit_price ? '$' + t.exit_price.toFixed(2) : '—'"></td>
                      <td :class="pnlClass(t.pnl_gbp)" x-text="formatGbp(t.pnl_gbp)"></td>
                      <td style="color: var(--ink-muted); font-size: 0.85em;"
                          x-text="t.fees_gbp ? '-' + formatGbp(Math.abs(t.fees_gbp)) : '—'"></td>
                      <td :class="pnlClass(t.pnl_pct)" x-text="formatPct(t.pnl_pct)"></td>
                      <td x-text="t.exit_reason"></td>
                      <td>
                        <a href="#" @click.prevent="expanded = (expanded === t.trade_id) ? null : t.trade_id"
                           style="font-family: var(--sans); font-size: 0.78rem; color: var(--ink-muted); text-decoration: underline;"
                           x-text="expanded === t.trade_id ? 'hide' : 'why?'"></a>
                      </td>
                    </tr>
                    <tr x-show="expanded === t.trade_id">
                      <td colspan="9" style="background: var(--paper-dark); padding: 1rem 1.2rem; font-family: var(--serif-body);">
                        <div style="margin-bottom: 0.6rem;">
                          <div style="font-family: var(--sans); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 0.2rem;">Why entered</div>
                          <div x-text="t.thesis || '(no thesis recorded)'"></div>
                        </div>
                        <template x-if="t.fees_breakdown && Object.keys(t.fees_breakdown).length">
                          <div style="margin-bottom: 0.6rem;">
                            <div style="font-family: var(--sans); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--c-amber); margin-bottom: 0.2rem;">Fees breakdown</div>
                            <div style="font-family: var(--sans); font-size: 0.85rem;">
                              <template x-for="[k, v] in Object.entries(t.fees_breakdown)" :key="k">
                                <span style="margin-right: 1rem;">
                                  <span x-text="k.replace(/_gbp$/, '').replace(/_/g, ' ')"></span>
                                  <strong x-text="'£' + Number(v).toFixed(2)"></strong>
                                </span>
                              </template>
                            </div>
                          </div>
                        </template>
                        <template x-if="t.outcome_notes">
                          <div style="margin-bottom: 0.6rem;">
                            <div style="font-family: var(--sans); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--c-pos); margin-bottom: 0.2rem;">What happened</div>
                            <div x-text="t.outcome_notes"></div>
                          </div>
                        </template>
                        <template x-if="t.risks_observed">
                          <div>
                            <div style="font-family: var(--sans); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--c-amber); margin-bottom: 0.2rem;">⚠ Risks observed</div>
                            <div x-text="t.risks_observed"></div>
                          </div>
                        </template>
                      </td>
                    </tr>
                  </tbody>
                </template>
              </table>
            </template>
          </div>
        </template>

        <template x-if="subtab === 'uncommitted'">
          <div>
            <template x-if="current.uncommitted.length === 0">
              <div style="padding: 1.5rem; text-align: center; font-style: italic; color: var(--ink-muted);">
                No uncommitted predictions yet.
              </div>
            </template>
            <template x-if="current.uncommitted.length > 0">
              <table class="trades-table">
                <thead>
                  <tr>
                    <th>Date</th><th>Ticker</th><th>Class</th>
                    <th>Predicted %</th><th>Actual %</th><th>Conviction</th><th></th>
                  </tr>
                </thead>
                <template x-for="(p, i) in current.uncommitted.slice(0, 30)" :key="i">
                  <tbody>
                    <tr>
                      <td x-text="p.prediction_date"></td>
                      <td class="ticker" x-text="p.ticker"></td>
                      <td><span class="pred-class-badge" :class="p.predicted_class"
                                x-text="p.predicted_class.replace('_', ' ')"></span></td>
                      <td :class="pnlClass(p.predicted_return_pct)" x-text="formatPct(p.predicted_return_pct)"></td>
                      <td :class="pnlClass(p.actual_return_pct)"
                          x-text="p.actual_return_pct != null ? formatPct(p.actual_return_pct) : '—'"></td>
                      <td x-text="p.conviction.toFixed(2)"></td>
                      <td>
                        <a href="#" @click.prevent="expanded = (expanded === 'p' + i) ? null : 'p' + i"
                           style="font-family: var(--sans); font-size: 0.78rem; color: var(--ink-muted); text-decoration: underline;"
                           x-text="expanded === 'p' + i ? 'hide' : 'why?'"></a>
                      </td>
                    </tr>
                    <tr x-show="expanded === 'p' + i">
                      <td colspan="7" style="background: var(--paper-dark); padding: 1rem 1.2rem; font-family: var(--serif-body);">
                        <div style="font-family: var(--sans); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 0.2rem;">Rationale</div>
                        <div x-text="p.rationale"></div>
                      </td>
                    </tr>
                  </tbody>
                </template>
              </table>
            </template>
          </div>
        </template>
      </section>
    </template>

    <template x-if="!current && filteredStrategies.length > 0">
      <div style="margin-top: 1.5rem; padding: 1.5rem; text-align: center; font-family: var(--serif-body); font-style: italic; color: var(--ink-muted);">
        Click a strategy above to see details.
      </div>
    </template>

    <footer class="colophon">
      Real-time view. Every other page on this site is derived from what you see here.
    </footer>

  </main>

  <script>
    // Font picker — same as the static pages
    const BOT_FONTS = {
      classic:    { head: "'Playfair Display', Georgia, serif", body: "'Source Serif 4', Georgia, serif", sans: "'Source Sans 3', sans-serif" },
      newsreader: { head: "'Newsreader', Georgia, serif",       body: "'Newsreader', Georgia, serif",      sans: "'Inter', sans-serif" },
      crimson:    { head: "'Crimson Pro', Georgia, serif",      body: "'Crimson Pro', Georgia, serif",     sans: "'IBM Plex Sans', sans-serif" },
      lora:       { head: "'Lora', Georgia, serif",             body: "'Lora', Georgia, serif",            sans: "'Lato', sans-serif" },
    };
    function applyBotFont(name) {
      const f = BOT_FONTS[name] || BOT_FONTS.classic;
      const r = document.documentElement.style;
      r.setProperty('--serif-head', f.head);
      r.setProperty('--serif-body', f.body);
      r.setProperty('--sans', f.sans);
      try { localStorage.setItem('botFont', name); } catch(e) {}
      document.querySelectorAll('.font-picker button').forEach(b => {
        b.classList.toggle('active', b.dataset.font === name);
      });
    }
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.font-picker button').forEach(b => {
        b.addEventListener('click', () => applyBotFont(b.dataset.font));
      });
      let saved = 'classic';
      try { saved = localStorage.getItem('botFont') || 'classic'; } catch(e) {}
      applyBotFont(saved);
    });

    function dashboard() {
      return {
        data: { active: [], archived: [], regions: [], generated_at: null },
        tab: 'active',
        region: localStorage.getItem('region') || 'us',
        search: '',
        selected: null,
        subtab: 'executed',
        expanded: null,
        chartInstance: null,

        async load() {
          try {
            const response = await fetch('data.json', { cache: 'no-store' });
            this.data = await response.json();
          } catch (e) {
            console.error('Failed to load data.json', e);
          }
        },

        get regionsAvailable() {
          return (this.data.regions && this.data.regions.length) ? this.data.regions : ['us'];
        },

        regionLabel(r) {
          if (r === 'us') return 'US';
          if (r === 'uk-eu') return 'UK/EU';
          return r.toUpperCase();
        },

        filterByRegion(pool) {
          if (this.region === 'all') return pool;
          return pool.filter(s => s.region === this.region);
        },

        get filteredStrategies() {
          const base = this.tab === 'active' ? (this.data.active || []) : (this.data.archived || []);
          const pool = this.filterByRegion(base);
          const q = this.search.trim().toLowerCase();
          if (!q) return pool;
          return pool.filter(s =>
            s.display_name.toLowerCase().includes(q) ||
            s.id.toLowerCase().includes(q) ||
            (s.description || '').toLowerCase().includes(q)
          );
        },

        get overview() {
          const REAL_TIERS = new Set(['alpaca-paper', 'trading212-paper', 't212-live']);
          const today = new Date().toISOString().slice(0, 10);
          const real = { tiers: new Set(), todayPnl: 0, todayN: 0, alltimePnl: 0, alltimeN: 0, alltimeWins: 0 };
          const shadow = { tiers: new Set(['shadow']), todayPnl: 0, todayN: 0, alltimePnl: 0, alltimeN: 0, alltimeWins: 0 };
          for (const s of this.filteredStrategies) {
            const tier = (s.tier || '').toLowerCase();
            const target = REAL_TIERS.has(tier) ? real : shadow;
            if (REAL_TIERS.has(tier)) target.tiers.add(tier);
            for (const t of (s.executed || [])) {
              if (t.pnl_gbp == null || t.exit_date == null) continue;
              const p = Number(t.pnl_gbp);
              target.alltimePnl += p;
              target.alltimeN += 1;
              if (p > 0) target.alltimeWins += 1;
              if (t.exit_date === today) {
                target.todayPnl += p;
                target.todayN += 1;
              }
            }
          }
          const finalize = (b) => ({
            tiers: Array.from(b.tiers).sort(),
            todayPnl: +b.todayPnl.toFixed(2),
            todayN: b.todayN,
            alltimePnl: +b.alltimePnl.toFixed(2),
            alltimeN: b.alltimeN,
            hitRate: b.alltimeN > 0 ? b.alltimeWins / b.alltimeN : null,
          });
          return { real: finalize(real), shadow: finalize(shadow) };
        },

        get current() {
          const all = [...(this.data.active || []), ...(this.data.archived || [])];
          return all.find(s => (s.key || s.id) === this.selected) || null;
        },

        selectStrategy(key) {
          this.selected = this.selected === key ? null : key;
          this.subtab = 'executed';
          this.expanded = null;
          this.$nextTick(() => {
            if (this.current) this.renderChart(this.current);
          });
        },

        setRegion(r) {
          this.region = r;
          localStorage.setItem('region', r);
          this.selected = null;
        },

        renderChart(strategy) {
          const canvas = document.getElementById('equity-chart');
          if (!canvas) return;
          if (this.chartInstance) this.chartInstance.destroy();
          const points = strategy.equity_curve || [];
          const labels = points.map(p => p.date || 'start');
          const values = points.map(p => p.equity);
          const gridColor = 'rgba(0,0,0,0.06)';
          const tickColor = '#757373';
          const positive = values[values.length - 1] >= values[0];
          const lineColor = positive ? '#166534' : '#8b1e1e';
          this.chartInstance = new Chart(canvas, {
            type: 'line',
            data: {
              labels,
              datasets: [{
                label: 'Equity (£)',
                data: values,
                borderColor: lineColor,
                backgroundColor: lineColor + '22',
                tension: 0.25,
                fill: true,
                pointRadius: 0,
                pointHoverRadius: 4,
                borderWidth: 2,
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              interaction: { mode: 'index', intersect: false },
              plugins: { legend: { display: false } },
              scales: {
                x: { grid: { color: gridColor }, ticks: { color: tickColor, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 } },
                y: { grid: { color: gridColor }, ticks: { color: tickColor, callback: v => '£' + v.toLocaleString() } }
              }
            }
          });
        },

        pnlClass(v) {
          if (v == null) return '';
          if (v > 0) return 'positive';
          if (v < 0) return 'negative';
          return '';
        },

        formatGbp(v) {
          if (v == null) return '—';
          const sign = v > 0 ? '+' : v < 0 ? '−' : '';
          return sign + '£' + Math.abs(v).toFixed(2);
        },

        formatPct(v) {
          if (v == null) return '—';
          const sign = v > 0 ? '+' : v < 0 ? '−' : '';
          return sign + Math.abs(v).toFixed(2) + '%';
        },

        sectorColor(sector) {
          // Deterministic palette — same sector always gets the same colour
          // across the bar and the legend.
          const palette = ['#1e3a8a', '#0f766e', '#b45309', '#6b21a8', '#065f46',
                           '#92400e', '#0e7490', '#7e22ce', '#8b1e1e', '#166534',
                           '#374151'];
          const s = String(sector || 'Unknown');
          let hash = 0;
          for (let i = 0; i < s.length; i++) hash = (hash * 31 + s.charCodeAt(i)) | 0;
          return palette[Math.abs(hash) % palette.length];
        },

        formatTimestamp(ts) {
          if (!ts) return 'never';
          try { return new Date(ts).toLocaleString(); }
          catch { return ts; }
        },
      };
    }
  </script>
</body>
</html>
